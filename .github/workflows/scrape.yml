# ─────────────────────────────────────────────────────────────────
# .github/workflows/scrape.yml
# Runs JobRadar scraper daily at 7:30 AM IST (2:00 UTC)
# and pushes updated jobs.json to the repo
# ─────────────────────────────────────────────────────────────────

name: JobRadar Daily Scrape

on:
  schedule:
    - cron: "0 2 * * *"      # 7:30 AM IST every day
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        env:
          WHATSAPP_PHONE:   ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_API_KEY: ${{ secrets.WHATSAPP_API_KEY }}
        run: |
          cd backend
          python scraper.py

      - name: Commit & push updated jobs.json
        run: |
          git config user.name  "JobRadar Bot"
          git config user.email "jobradar@noreply.github.com"
          git add public/jobs.json logs/
          git diff --staged --quiet || git commit -m "🤖 JobRadar update — $(date +'%Y-%m-%d')"
          git push
